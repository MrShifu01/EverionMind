name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      # xlsx has high-severity vulns with no upstream fix (GHSA-4r6h-8v6p-xvw6, GHSA-5pgg-2g8v-p4x9)
      # Using critical threshold so CI still catches truly critical issues
      - run: npm audit --audit-level=critical
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
